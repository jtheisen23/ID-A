name: Fetch Daily Bids

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Fetch bids
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: node scripts/fetch-bids.js

      - name: Commit updated bids
        run: |
          git config user.name "ID-A Bot"
          git config user.email "bot@id-a.local"
          git add -f data/auto-projects.json data/fetch-log.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily bid refresh $(date -u +%Y-%m-%d)"
            git push origin main
          fi
