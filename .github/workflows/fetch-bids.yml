name: Fetch Daily Bids

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8 AM UTC (4 AM Eastern)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Fetch bids
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: node scripts/fetch-bids.js

      - name: Commit updated bids
        run: |
          git config user.name  "ID-A Bot"
          git config user.email "bot@id-a.local"
          git add data/auto-projects.json data/fetch-log.json
          git diff --staged --quiet || git commit -m "chore: daily bid refresh $(date -u +%Y-%m-%d)"
          git push
